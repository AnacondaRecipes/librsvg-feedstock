{% set name = "librsvg" %}
{% set version = "2.62.1" %}
{% set abi_version = "2.0" %}
{% set version_majmin = version.rsplit('.', 1)[0] %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://download.gnome.org/sources/{{ name }}/{{ version_majmin }}/{{ name }}-{{ version }}.tar.xz
  sha256: b41ca84206242fddd826a2bf76348d7cdf52c1050cbfa060b866e81a252145c3
  patches:
    - add_rust_lto.patch
    - windows_gir.patch  # [win]

build:
  number: 0
  run_exports:
    # Looks good but no new info after 2.43 so keeping it x.x for safety.
    # https://abi-laboratory.pro/?view=timeline&l=librsvg
    - {{ pin_subpackage('librsvg', max_pin='x') }}

requirements:
  build:
    - {{ stdlib('c') }}
    - {{ compiler('c') }}
    - {{ compiler('rust') }}
    - gobject-introspection
    - meson
    - cmake                       # [win] # for FreeType fallback
    - ninja-base
    - pkg-config
    - cargo-c
  host:
    - glib {{ glib }}
    - libxml2 {{ libxml2 }}
    - cairo {{ cairo }}
    - gdk-pixbuf {{ gdk_pixbuf }}
    - pango {{ pango }}
    - zlib {{ zlib }}
    - libiconv {{ libiconv }}       # [osx]
    - harfbuzz {{ harfbuzz }}
    - libpng {{ libpng }}    # required by rsvg-convert
    - freetype {{ freetype }}
    - fontconfig {{ fontconfig }}
    - gobject-introspection
    - libintl                       # [osx]
  run:
    - cairo
    - freetype
    - libglib
    - harfbuzz
    - libxml2
    - pango
    - gdk-pixbuf
    - fontconfig
    - libzlib
    - libpng    # required by rsvg-convert
    - libiconv          # [osx]
    - libintl           # [osx]

test:
  requires:
    - pkg-config
  commands:
    # --- UNIX / macOS shell commands ---
    - pkg-config --modversion librsvg-2.0                     # [unix]
    - rsvg-convert --version                                  # [unix]
    # create a tiny SVG and render to PNG (unix)
    - echo '<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32"><rect width="100%" height="100%" fill="red"/></svg>' > svg-check.svg       # [unix]
    - rsvg-convert svg-check.svg -o out.png                   # [unix]
    - test -f out.png                                         # [unix]
    # check that gdk-pixbuf loader for svg is registered (if gdk-pixbuf installed)
    - gdk-pixbuf-query-loaders --update-cache || true         # [unix]
    - gdk-pixbuf-query-loaders --list | grep -i svg || true   # [unix]

    # --- Windows ---
    - rsvg-convert.exe --version                              # [win]
    # create svg and render (windows)
    - cmd.exe /c "echo ^<svg xmlns='http://www.w3.org/2000/svg' width='32' height='32'^>^<rect width='100%' height='100%' fill='blue'/^>^</svg^> > svg-check.svg"   # [win]
    - cmd.exe /c "rsvg-convert.exe svg-check.svg -o out.png"  # [win]
    - cmd.exe /c "if not exist out.png exit 1"                # [win]
    - cmd.exe /c "pkg-config --modversion librsvg-2.0 || echo pkg-config not available"   # [win]

    {% set name_abi = name + "-" + abi_version %}
    {% set lib = name + "-" + abi_version.split('.', 1)[0] %}  # [unix]
    {% set lib = "rsvg-" + abi_version %}  # [win]
    {% set vs_major = dict(vs2015="14", vs2017="15", vs2019="16", vs2022="17").get(c_compiler, "XX") %}  # [win]

    # verify that libs get installed and can be located through pkg-config
    - test -f $PREFIX/lib/{{ lib }}${SHLIB_EXT}  # [unix]
    - test ! -f $PREFIX/lib/{{ lib }}.a  # [unix]
    - test -f `pkg-config --variable=libdir --dont-define-prefix {{ name_abi }}`/{{ lib }}${SHLIB_EXT}  # [unix]
    - if not exist %PREFIX%\\Library\\bin\\{{ lib }}-vs{{ vs_major }}.dll exit 1  # [win]
    - for /f "usebackq tokens=*" %%a in (`pkg-config --variable=exec_prefix --dont-define-prefix {{ name_abi }}`) do if not exist "%%a/bin/{{ lib }}-vs{{ vs_major }}.dll" exit 1  # [win]
    - if not exist %PREFIX%\\Library\\lib\\{{ lib }}.lib exit 1  # [win]
    - for /f "usebackq tokens=*" %%a in (`pkg-config --variable=libdir --dont-define-prefix {{ name_abi }}`) do if not exist "%%a/{{ lib }}.lib" exit 1  # [win]

    # verify that gdk-pixbuf loader library gets installed
    - test -f $PREFIX/lib/gdk-pixbuf-2.0/2.10.0/loaders/libpixbufloader_svg${SHLIB_EXT}  # [unix]
    - test ! -f $PREFIX/lib/gdk-pixbuf-2.0/2.10.0/loaders/libpixbufloader_svg.a  # [unix]
    - if not exist %PREFIX%\\Library\\lib\\gdk-pixbuf-2.0\\2.10.0\\loaders\\libpixbufloader_svg.dll exit 1  # [win]

    # verify that headers get installed
    - test -f $PREFIX/include/{{ name_abi }}/{{ name }}/rsvg-features.h  # [unix]
    - test -f $PREFIX/include/{{ name_abi }}/{{ name }}/rsvg-cairo.h  # [unix]
    - test -f $PREFIX/include/{{ name_abi }}/{{ name }}/rsvg.h  # [unix]
    - if not exist %PREFIX%\\Library\\include\\{{ name_abi }}\\{{ name }}\\rsvg-features.h exit 1  # [win]
    - if not exist %PREFIX%\\Library\\include\\{{ name_abi }}\\{{ name }}\\rsvg-cairo.h exit 1  # [win]
    - if not exist %PREFIX%\\Library\\include\\{{ name_abi }}\\{{ name }}\\rsvg.h exit 1  # [win]

    # test for gobject-introspection files
    - test -f $PREFIX/lib/girepository-1.0/Rsvg-2.0.typelib  # [unix]
    - if not exist %LIBRARY_LIB%\\girepository-1.0\\Rsvg-2.0.typelib exit 1  # [win]

  # downstreams:
  #  - adwaita-icon-theme 40.1.1
  #  - adwaita-icon-theme 48.0
  #  - ffmpeg 6.1.1
  #  - ffmpeg 8.0.1
  #  - graphviz 12.2.1

about:
  home: https://wiki.gnome.org/Projects/LibRsvg
  dev_url: https://gitlab.gnome.org/GNOME/librsvg
  doc_url: https://gnome.pages.gitlab.gnome.org/librsvg
  summary: Library to render SVG files using Cairo
  description: |
    librsvg is a GNOME library for rendering Scalable Vector Graphics (SVG) files.
    It is primarily used to render SVG images to Cairo surfaces and supports
    both static and animated SVG content.
  license: LGPL-2.1-or-later
  license_file: COPYING.LIB
  license_family: LGPL

extra:
  recipe-maintainers:
    - pkgw
    - tschoonj
    - xhochy
